<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <script>
        // 1. 問卷網址
        var urls = [
            "https://forms.gle/teDSYANo14he9sSV9"
        ];

        // 2. 隨機選取並加上時間戳記（防止快取）
        var randomIndex = Math.floor(Math.random() * urls.length);
        var targetUrl = urls[randomIndex] + "?t=" + new Date().getTime();

        // 3. 立即跳轉（放在最前面執行）
        window.location.replace(targetUrl);
    </script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #ffffff; }
        .dot-flashing { position: relative; width: 10px; height: 10px; border-radius: 5px; background-color: #3498db; color: #3498db; animation: dot-flashing 1s infinite linear alternate; animation-delay: .5s; }
        .dot-flashing::before, .dot-flashing::after { content: ''; display: inline-block; position: absolute; top: 0; }
        .dot-flashing::before { left: -15px; width: 10px; height: 10px; border-radius: 5px; background-color: #3498db; color: #3498db; animation: dot-flashing 1s infinite alternate; animation-delay: 0s; }
        .dot-flashing::after { left: 15px; width: 10px; height: 10px; border-radius: 5px; background-color: #3498db; color: #3498db; animation: dot-flashing 1s infinite alternate; animation-delay: 1s; }
        @keyframes dot-flashing { 0% { background-color: #3498db; } 50%, 100% { background-color: #ebe6ff; } }
    </style>
</head>
<body>
    <div class="dot-flashing"></div>
</body>
</html>
